name: Docker Build Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: v0.71.2
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Check Docker Compose
        run: docker compose version

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin "$TRIVY_VERSION"
          trivy --version

      - name: Create .env file
        run: |
          echo AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} >> backend/.env
          echo AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} >> backend/.env
          echo AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }} >> backend/.env

      - name: Build services
        run: |
          docker compose build --pull --no-cache

      - name: Scan built images with Trivy
        run: |
          set -euo pipefail

          docker compose config --images | while read -r image; do
            trivy image \
              --scanners vuln \
              --pkg-types os,library \
              --severity CRITICAL \
              --exit-code 1 \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              "$image"
          done

      - name: Test services
        run: |
          docker compose up -d
          docker compose ps
          docker compose logs
          docker compose down
