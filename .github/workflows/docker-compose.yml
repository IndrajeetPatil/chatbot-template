name: Docker Build Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      TRIVY_VERSION: v0.70.0
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin "$TRIVY_VERSION"
          trivy --version

      - name: Create .env file
        run: |
          echo AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }} >> backend/.env
          echo AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }} >> backend/.env
          echo AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }} >> backend/.env

      - name: Build services
        run: |
          docker-compose build --pull --no-cache

      - name: Scan built images with Trivy
        run: |
          set -euo pipefail

          docker-compose config --images | while read -r image; do
            trivy image \
              --scanners vuln \
              --pkg-types os,library \
              --severity CRITICAL \
              --exit-code 1 \
              --no-progress \
              --ignorefile .trivyignore.yaml \
              "$image"
          done

      - name: Test services
        run: |
          docker-compose up -d
          docker-compose ps
          docker-compose logs
          docker-compose down
